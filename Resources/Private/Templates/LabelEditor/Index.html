<html
        xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
        xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
        xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
        data-namespace-typo3-fluid="true"
>

<f:layout name="Module" />

<f:section name="Content">
    <h1><f:translate key="LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.title" /></h1>

    <f:be.pageRenderer includeJavaScriptModules="{0: '@typo3/backend/modal.js'}" />
    <f:be.pageRenderer includeJavaScriptModules="{0: '@amdeu/label-editor/label-editor.js'}" />
    <f:be.pageRenderer includeCssFiles="{0: 'EXT:label_editor/Resources/Public/Css/label-editor.css'}" />

    <div class="card-group-container">
        <!-- Managed Extensions -->
        <div class="card-group">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-header-headline"><f:translate key="LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.managed.headline" /></h2>
                </div>
                <f:if condition="{managedExtensions}">
                    <f:then>
                        <table class="table table-striped table-hover label-editor-extensions-table">
                            <thead>
                            <tr>
                                <th><f:translate key="LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.managed.extension" /></th>
                                <th><f:translate key="LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.managed.key" /></th>
                                <th><f:translate key="LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.managed.fileCount" /></th>
                                <th class="col-control"></th>
                            </tr>
                            </thead>
                            <tbody>
                            <f:for each="{managedExtensions}" as="extension">
                                <tr>
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <f:if condition="{extension.icon}">
                                                <img class="extension-icon" src="{extension.icon}" alt="{extension.title}" />
                                            </f:if>
                                            <span>{extension.title}</span>
                                        </div>
                                    </td>
                                    <td>
                                        <code>{extension.key}</code>
                                    </td>
                                    <td>
                                        {extension.files -> f:count()}
                                    </td>
                                    <td class="col-control">
                                        <div class="btn-group">
                                            <f:be.link
                                                    route="web_labeleditor"
                                                    parameters="{action: 'editExtension', extensionKey: extension.key}"
                                                    class="btn btn-sm btn-default"
                                                    title="{f:translate(key: 'LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.managed.editLabels')}"
                                            >
                                                <core:icon identifier="actions-open" />
                                            </f:be.link>
                                            <f:be.link
                                                    route="web_labeleditor"
                                                    parameters="{action: 'removeExtension', extensionKey: extension.key}"
                                                    class="btn btn-sm btn-default t3js-modal-trigger"
                                                    title="{f:translate(key: 'LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.managed.removeExtension')}"
                                                    data-severity="warning"
                                                    data-title="{f:translate(key: 'LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.managed.removeConfirmTitle')}"
                                                    data-content="{f:translate(key: 'LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.managed.removeConfirmMessage')}"
                                                    data-button-close-text="{f:translate(key: 'LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.managed.removeConfirmCancel')}"
                                                    data-button-ok-text="{f:translate(key: 'LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.managed.removeConfirmOk')}"
                                            >
                                                <core:icon identifier="actions-delete" />
                                            </f:be.link>
                                        </div>
                                    </td>
                                </tr>
                            </f:for>
                            </tbody>
                        </table>
                    </f:then>
                    <f:else>
                        <div class="card-body">
                            <p class="text-muted"><f:translate key="LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.managed.empty" /></p>
                        </div>
                    </f:else>
                </f:if>
            </div>
        </div>

        <!-- Available Extensions -->
        <div class="card-group">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-header-headline"><f:translate key="LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.available.headline" /></h2>
                </div>
                <f:if condition="{availableExtensions}">
                    <f:then>
                        <table class="table table-striped table-hover label-editor-extensions-table">
                            <thead>
                            <tr>
                                <th><f:translate key="LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.available.extension" /></th>
                                <th><f:translate key="LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.available.key" /></th>
                                <th class="col-control"></th>
                            </tr>
                            </thead>
                            <tbody>
                            <f:for each="{availableExtensions}" as="extension">
                                <tr>
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <f:if condition="{extension.icon}">
                                                <img class="extension-icon" src="{extension.icon}" alt="{extension.title}" />
                                            </f:if>
                                            <span>{extension.title}</span>
                                        </div>
                                    </td>
                                    <td><code>{extension.key}</code></td>
                                    <td class="col-control">
                                        <f:be.link
                                                route="web_labeleditor"
                                                parameters="{action: 'addExtension', extensionKey: extension.key}"
                                                class="btn btn-sm btn-default"
                                                title="{f:translate(key: 'LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.available.addExtension')}"
                                        >
                                            <core:icon identifier="actions-add" />
                                        </f:be.link>
                                    </td>
                                </tr>
                            </f:for>
                            </tbody>
                        </table>
                    </f:then>
                    <f:else>
                        <div class="card-body">
                            <p class="text-muted"><f:translate key="LLL:EXT:label_editor/Resources/Private/Language/locallang_be.xlf:index.available.empty" /></p>
                        </div>
                    </f:else>
                </f:if>
            </div>
        </div>
    </div>
</f:section>

</html>
